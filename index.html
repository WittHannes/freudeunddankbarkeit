<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      margin:0;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
      background-color: #f0f0f0;
      color: #222;
      transition: background 0.3s, color 0.3s;
    }
    input {
      padding: 10px;
      width: 400px;
      border-radius: 5px;
      border: 1px solid #ccc;
    }
    @media (prefers-color-scheme: dark) {
      body {
        background-color: #181818;
        color: #f0f0f0;
      }
      input {
        background: #222;
        color: #f0f0f0;
        border: 1px solid #444;
      }
    }
    .darkmode {
      background-color: #181818 !important;
      color: #f0f0f0 !important;
    }
    .darkmode input {
      background: #222;
      color: #f0f0f0;
      border: 1px solid #444;
    }
  </style>
</head>
<body>
  <div style="display:flex; flex-direction:column; align-items:center; gap: 20px;">
    <a href="https://freudeunddankbarkeit.duckdns.org" target="_blank" style="cursor: pointer;">
      <img src="grafik.png" style="max-width:500px; height:auto; display: block;">
    </a>
    <input type="text" placeholder="Die Wurzel aus der Summe zieht in Schleswig nur der Domschüler" disabled>
  </div>
  <button id="toggleModeBtn" style="
    position: fixed;
    bottom: 20px;
    left: 20px;
    padding: 6px 14px;
    border-radius: 5px;
    border: none;
    background: #333;
    color: #fff;
    cursor: pointer;
    opacity: 0.7;
    z-index: 1000;
    font-size: 14px;
  ">🌙</button>
  <script>
    // Set initial mode based on system preference
    function setInitialMode() {
      if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
        document.body.classList.add('darkmode');
        document.getElementById('toggleModeBtn').textContent = '☀️';
      } else {
        document.body.classList.remove('darkmode');
        document.getElementById('toggleModeBtn').textContent = '🌙';
      }
    }
    setInitialMode();

    // Manual toggle always overrides system preference
    document.getElementById('toggleModeBtn').onclick = function() {
      document.body.classList.toggle('darkmode');
      if (document.body.classList.contains('darkmode')) {
        this.textContent = '☀️';
      } else {
        this.textContent = '🌙';
      }
    };

    // Listen for system changes and update only if user hasn't toggled manually
    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', e => {
      // Only update if the user hasn't toggled manually (button state matches system)
      setInitialMode();
    });
  </script>
</body>
</html>
