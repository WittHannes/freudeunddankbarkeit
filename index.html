<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      margin:0;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
      background-color: #f0f0f0;
      color: #222;
      transition: background 0.3s, color 0.3s;
    }
    input {
      padding: 10px;
      width: 400px;
      border-radius: 5px;
      border: 1px solid #ccc;
    }
    .light {
      background-color: #f0f0f0 !important;
      color: #222 !important;
    }
    .light input {
      background: white !important;
      color: #222 !important;
      border: 1px solid #ccc !important;
    }
    .dark {
      background-color: #181818 !important;
      color: #f0f0f0 !important;
    }
    .dark input {
      background: #222 !important;
      color: #f0f0f0 !important;
      border: 1px solid #444 !important;
    }
  </style>
</head>
<body>
  <div style="display:flex; flex-direction:column; align-items:center; gap: 20px;">
    <h1>Hier empfinden wir Freude und Dankbarkeit</h1>
    <div style="display:flex; justify-content:center; gap: 20px;">
      <a href="https://kups.ub.uni-koeln.de/942/1/Prom.pdf" target="_blank" style="cursor: pointer;">
        <img src="grafik1.jpeg" style="max-width:300px; height:auto; display: block;">
      </a>
      <a href="https://freudeunddankbarkeit.duckdns.org" target="_blank" style="cursor: pointer;">
        <img src="grafik.png" style="max-width:300px; height:auto; display: block;">
      </a>
      <a href="https://lornsenschule.de/wp-content/uploads/2023/03/2020Knetter.jpg" target="_blank" style="cursor: pointer;">
        <img src="grafik2.png" style="max-width:300px; height:auto; display: block;">
      </a>
    </div>
  </div>
  <button id="toggleModeBtn" style="
    position: fixed;
    bottom: 20px;
    left: 20px;
    padding: 6px 14px;
    border-radius: 5px;
    border: none;
    background: #333;
    color: #fff;
    cursor: pointer;
    opacity: 0.7;
    z-index: 1000;
    font-size: 14px;
  ">🌙</button>
  <script>
    let hasUserToggled = false;

    // Set initial mode based on system preference
    function setInitialMode() {
      if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
        document.body.classList.remove('light');
        document.body.classList.add('dark');
        document.getElementById('toggleModeBtn').textContent = '☀️';
      } else {
        document.body.classList.remove('dark');
        document.body.classList.add('light');
        document.getElementById('toggleModeBtn').textContent = '🌙';
      }
      hasUserToggled = false;
    }
    setInitialMode();

    // Manual toggle always overrides system preference
    document.getElementById('toggleModeBtn').onclick = function() {
      if (document.body.classList.contains('dark')) {
        document.body.classList.remove('dark');
        document.body.classList.add('light');
        this.textContent = '🌙';
      } else {
        document.body.classList.remove('light');
        document.body.classList.add('dark');
        this.textContent = '☀️';
      }
      hasUserToggled = true;
    };

    // Listen for system changes and update only if user hasn't toggled manually
    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', e => {
      if (!hasUserToggled) {
        setInitialMode();
      }
    });
  </script>
</body>
</html>
